<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTA Banner Section</title>
    <style>
        /* CSS Variables for easy theming */
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --background-light: #ffffff;
            --background-dark: #1f2937;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --radius-md: 8px;
            --radius-lg: 16px;
            --spacing-unit: 8px;
            --max-width: 1200px;
        }

        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background-color: var(--background-light);
        }

        /* CTA Banner Styles */
        .cta-banner {
            padding: calc(var(--spacing-unit) * 4) var(--spacing-unit);
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .cta-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23ffffff"/><path d="M0,0 L100,100 M100,0 L0,100" stroke="%23ffffff" stroke-width="0.5" opacity="0.1"/></svg>');
            opacity: 0.05;
            pointer-events: none;
        }

        .cta-banner-content {
            max-width: var(--max-width);
            margin: 0 auto;
            z-index: 2;
            position: relative;
        }

        .cta-banner-content h2 {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 700;
            margin-bottom: calc(var(--spacing-unit) * 2);
        }

        .cta-banner-content p {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            font-weight: 400;
            margin-bottom: calc(var(--spacing-unit) * 3);
            opacity: 0.9;
            max-width: 50ch;
        }

        .cta-banner-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: calc(var(--spacing-unit) * 2);
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: calc(var(--spacing-unit) * 2) calc(var(--spacing-unit) * 3);
            font-weight: 600;
            border-radius: var(--radius-md);
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-primary {
            background-color: white;
            color: var(--primary-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-primary:hover {
            background-color: #f0f0ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }

        .btn-outline {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .cta-banner-content h2 {
                font-size: clamp(1.5rem, 5vw, 2rem);
            }
            
            .cta-banner-content p {
                font-size: clamp(0.875rem, 3vw, 1.25rem);
            }
            
            .cta-banner-buttons {
                flex-direction: column;
                align-items: stretch;
            }
            
            .btn {
                width: 100%;
                max-width: 280px;
            }
        }

        /* Accessibility: Focus Styles */
        .btn:focus {
            outline: 3px solid rgba(255, 255, 255, 0.5);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <!-- CTA Banner Section -->
    <section class="cta-banner">
        <div class="cta-banner-content">
            <h2>Ready to Transform Your Business?</h2>
            <p>Join thousands of satisfied customers who have improved their workflow and boosted their productivity with our all-in-one platform.</p>
            <div class="cta-banner-buttons">
                <a href="#" class="btn btn-primary">Get Started Free</a>
                <a href="#" class="btn btn-outline">Watch Demo</a>
            </div>
        </div>
    </section>
</body>
</html>
