<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Hero Section</title>
    <style>
        /* CSS Variables for easy theming */
        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --background-light: #ffffff;
            --background-dark: #1f2937;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --radius-md: 8px;
            --radius-lg: 16px;
            --spacing-unit: 8px;
            --max-width: 1200px;
        }

        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background-color: var(--background-light);
        }

        /* Hero Section Styles */
        .hero-split {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: var(--spacing-unit);
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .hero-split::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23ffffff"/><path d="M0,0 L100,100 M100,0 L0,100" stroke="%23ffffff" stroke-width="0.5" opacity="0.1"/></svg>');
            opacity: 0.05;
            pointer-events: none;
        }

        .hero-split-content {
            flex: 1;
            max-width: var(--max-width);
            padding: 0 calc(var(--spacing-unit) * 2);
            z-index: 2;
            position: relative;
        }

        .hero-split-content h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            margin-bottom: calc(var(--spacing-unit) * 2);
            line-height: 1.2;
        }

        .hero-split-content p {
            font-size: clamp(1rem, 2.5vw, 1.5rem);
            font-weight: 400;
            margin-bottom: calc(var(--spacing-unit) * 3);
            opacity: 0.9;
            max-width: 40ch;
        }

        .hero-split-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: calc(var(--spacing-unit) * 2);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: calc(var(--spacing-unit) * 2) calc(var(--spacing-unit) * 3);
            font-weight: 600;
            border-radius: var(--radius-md);
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-primary {
            background-color: white;
            color: var(--primary-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-primary:hover {
            background-color: #f0f0ff;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }

        .btn-outline {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .hero-split-image {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(var(--spacing-unit) * 2);
            z-index: 2;
            position: relative;
        }

        .hero-split-image img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* Placeholder for image - in real use, replace with actual image */
        .image-placeholder {
            width: 100%;
            height: 400px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .hero-split {
                flex-direction: column;
                text-align: center;
            }
            
            .hero-split-content h1 {
                font-size: clamp(1.75rem, 6vw, 2.5rem);
            }
            
            .hero-split-content p {
                font-size: clamp(0.9rem, 3vw, 1.25rem);
            }
            
            .hero-split-image {
                order: -1; /* Image on top on mobile */
                margin-bottom: calc(var(--spacing-unit) * 4);
            }
            
            .image-placeholder {
                height: 300px;
            }
        }

        /* Accessibility: Focus Styles */
        .btn:focus {
            outline: 3px solid rgba(255, 255, 255, 0.5);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <!-- Split Hero Section -->
    <section class="hero-split">
        <div class="hero-split-content">
            <h1>Transform Your Business with Modern Solutions</h1>
            <p>We help companies like yours achieve unprecedented growth through innovative technology and expert guidance. Our platform combines powerful features with intuitive design to deliver results that matter.</p>
            <div class="hero-split-buttons">
                <a href="#" class="btn btn-primary">Get Started Free</a>
                <a href="#" class="btn btn-outline">Learn More</a>
            </div>
        </div>
        <div class="hero-split-image">
            <!-- Replace this placeholder with an actual image -->
            <div class="image-placeholder">
                <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="40" cy="40" r="35" fill="rgba(255,255,255,0.2)"/>
                    <path d="M20 40h40" stroke="white" stroke-width="4" linecap="round"/>
                    <path d="M40 20v40" stroke="white" stroke-width="4" linecap="round"/>
                </svg>
                <span>Illustration</span>
            </div>
        </div>
    </section>
</body>
</html>
